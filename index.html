<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-title" content="Azad Photographer">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/Hnsth8bN/IMG-6740.jpg">
    
    <title>Azad Rekane | Photographer</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+Arabic:wght@400;900&display=swap');

        :root {
            --neon-cyan: #00f2ff;
            --neon-green: #00ff41;
            --main-bg: #030303;
        }

        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Noto Sans Arabic', sans-serif;
            background: var(--main-bg);
            color: #fff; overflow-x: hidden;
        }

        /* --- ئیفێکتێ فلاشێ --- */
        #camera-flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 1);
            opacity: 0; pointer-events: none; z-index: 9999;
        }

        .bg-photo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?q=80&w=2000') no-repeat center center fixed;
            background-size: cover;
            z-index: -2;
            filter: brightness(0.25) saturate(0.5);
        }

        .overlay-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, #000 100%);
            z-index: -1;
        }

        .container {
            position: relative; z-index: 1;
            max-width: 410px; margin: 40px auto;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 35px;
            padding: 45px 20px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.1);
        }

        .lens-frame {
            position: relative;
            width: 160px; height: 160px;
            margin: 0 auto 35px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(45deg, var(--neon-cyan), transparent, var(--neon-green));
            animation: rotateBorder 6s linear infinite;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .lens-frame:active {
            transform: scale(0.92);
        }

        @keyframes rotateBorder { to { transform: rotate(360deg); } }

        .logo-img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #000;
            animation: reverseRotate 6s linear infinite;
            transition: opacity 0.3s ease;
        }

        @keyframes reverseRotate { to { transform: rotate(-360deg); } }

        .name-main { 
            font-family: 'Orbitron', sans-serif;
            font-size: 28px; font-weight: 900; 
            background: linear-gradient(90deg, #fff, var(--neon-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .name-sub { 
            font-size: 13px; color: var(--neon-cyan); 
            letter-spacing: 2px; font-weight: 700; margin-bottom: 35px;
            text-shadow: 0 0 10px var(--neon-cyan);
            text-transform: uppercase;
        }

        .dynamic-service-btn {
            background: rgba(0,0,0,0.7);
            border: 2px solid var(--neon-green);
            border-radius: 20px; padding: 20px; margin-bottom: 25px;
            box-shadow: inset 0 0 15px rgba(0, 255, 65, 0.1), 0 0 15px rgba(0, 255, 65, 0.1);
            transition: 0.3s;
        }

        #service-text { font-family: 'Orbitron', sans-serif; font-size: 19px; color: #fff; letter-spacing: 2px; }
        #service-desc { font-size: 12px; opacity: 0.9; margin-top: 8px; color: #ddd; line-height: 1.5; }

        .contact-btn {
            background: linear-gradient(90deg, var(--neon-cyan), #0088ff);
            color: #000 !important;
            border-radius: 15px; padding: 18px; text-decoration: none; 
            display: flex; align-items: center; justify-content: center; gap: 12px;
            font-weight: 900; margin-bottom: 35px;
            box-shadow: 0 10px 25px rgba(0, 242, 255, 0.3);
            transition: 0.3s;
        }

        .social-row { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 14px;
        }

        .s-link {
            width: 55px; height: 55px;
            background: #0a0a0a;
            border: 2px solid rgba(0, 242, 255, 0.3);
            border-radius: 50% 5% 50% 5%; 
            display: flex; align-items: center; justify-content: center;
            color: #fff; text-decoration: none; font-size: 22px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .s-link:hover { 
            border-radius: 50%;
            background: var(--neon-cyan);
            color: #000;
            transform: scale(1.1) rotate(360deg);
            box-shadow: 0 0 25px var(--neon-cyan);
            border-color: #fff;
        }

        .footer { 
            margin-top: 45px; font-size: 10px; color: #555;
            letter-spacing: 2px; font-weight: bold;
            line-height: 1.8;
        }

        .powered-by {
            color: var(--neon-cyan);
            font-size: 9px;
            letter-spacing: 3px;
        }

        .powered-by a {
            color: var(--neon-cyan);
            text-decoration: none;
            transition: 0.3s;
        }

        .powered-by a:hover {
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .exit-anim { opacity: 0; transform: scale(0.9); filter: blur(5px); }
    </style>
</head>
<body>

<div id="camera-flash"></div>

<div class="bg-photo"></div>
<div class="overlay-gradient"></div>

<div class="container">
    <div class="lens-frame" onclick="changePhotoEffect(this)">
        <img src="https://i.postimg.cc/Hnsth8bN/IMG-6740.jpg" id="profile-img" class="logo-img" alt="Azad Rekane">
    </div>

    <div class="name-main">AZAD REKANE</div>
    <div class="name-sub">PHOTOGRAPHER AT DUHOK POLICE</div>

    <div id="service-btn" class="dynamic-service-btn">
        <div id="service-content" style="transition: 0.5s;">
            <div id="service-text">PHOTOGRAPHY</div>
            <div id="service-desc">Professional Cinematic Capturing<br>تومارکرنا جوانترین دیمەنێن ژیانێ</div>
        </div>
    </div>

    <a href="tel:+9647504836177" class="contact-btn">
        <i class="fa-solid fa-camera"></i>
        <span>CALL | +9647504836177</span>
    </a>

    <div class="social-row">
        <a href="https://www.tiktok.com/@azadrekane4" class="s-link" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
        <a href="https://www.instagram.com/azad.rekane" class="s-link" target="_blank"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://api.whatsapp.com/send?phone=9647504836177" class="s-link" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
        <a href="https://www.facebook.com/azad.rekane" class="s-link" target="_blank"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="mailto:azadrekani90@gmail.com" class="s-link" target="_blank"><i class="fa-solid fa-envelope"></i></a>
    </div>

    <div class="footer">
        © 2026 AZAD REKANE DIGITAL<br>
        <span class="powered-by">POWERED BY: <a href="https://bizhar-cloud.github.io/BizharRasheed/" target="_blank">BIZHAR RASHEED</a></span>
    </div>
</div>

<script>
    // Camera Flash effect
    function triggerFlash() {
        const flash = document.getElementById('camera-flash');
        flash.style.transition = 'none';
        flash.style.opacity = '1'; 
        
        setTimeout(() => {
            flash.style.transition = 'opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
            flash.style.opacity = '0'; 
        }, 50);
    }

    setInterval(triggerFlash, 12000);

    // Dynamic Photo Change on Click
    function changePhotoEffect(element) {
        const img = document.getElementById('profile-img');
        const secondImg = "https://i.postimg.cc/fT1xxrgQ/IMG-6739.jpg";
        const firstImg = "https://i.postimg.cc/Hnsth8bN/IMG-6740.jpg";
        
        triggerFlash();
        
        img.style.opacity = "0";
        setTimeout(() => {
            img.src = img.src === firstImg ? secondImg : firstImg;
            img.style.opacity = "1";
        }, 300);
    }

    // Dynamic Service Text
    const services = [
        { text: "PHOTOGRAPHY", desc: "Professional Cinematic Capturing<br>تومارکرنا جوانترین دیمەنێن ژیانێ" },
        { text: "EDITING", desc: "Visual Effects & Color Grading<br>دەستکاری کرنا ڤیدیۆ و وێنەیان ب شێوەیەکێ مودێرن" }
    ];

    let sIndex = 0;
    setInterval(() => {
        const content = document.getElementById("service-content");
        const text = document.getElementById("service-text");
        const desc = document.getElementById("service-desc");
        content.classList.add("exit-anim");
        setTimeout(() => {
            sIndex = (sIndex + 1) % services.length;
            text.innerText = services[sIndex].text;
            desc.innerHTML = services[sIndex].desc;
            content.classList.remove("exit-anim");
        }, 500);
    }, 4500);
</script>

</body>
</html>
